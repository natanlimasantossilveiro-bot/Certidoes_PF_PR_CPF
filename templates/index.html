<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Consulta CPF</title>
</head>
<body>
  <main>
    <h1>Consulta CPF</h1>

    {% if mensagem %}
      <p>{{ mensagem }}</p>
    {% endif %}

    <form method="post" action="/iniciar">
      <label>CPF</label>
      <input name="cpf" required>

      <label>Data de nascimento</label>
      <input name="nascimento" placeholder="DD/MM/AAAA" required>

      <button type="submit">Consultar</button>

      {% if arquivo %}
        <a href="/certidoes/{{ arquivo }}">Baixar PDF</a>
      {% endif %}
    </form>
  </main>
</body>
</html>
